author: "Shod, Saukykouko, Singul0, Deadgebert, lelandkemble, necromanceranne, hack-wrench, improvedname, Jacquerel, SmArtKar"
delete-after: True
changes:
  - balance: "traitors no longer have access to progtot, they now start with 25 TC and all uplink prices have been balanced around this. Please check PR #11093 for a full list of changes"
  - rscdel: "Final objectives have been completely removed"
  - rscadd: "Added pony to the uplink!"
  - rscadd: "Adds 3 new kits into the syndie-kit spawn pool, 2 for special and another for tactical"
  - balance: "Removes buy limit on traitor discounts"
  - bugfix: "removes dupe listing of razorwire"
  - bugfix: "Station MODules no longer provide illegal technology"
  - rscadd: "adds a smoke implant to uplink for tc , with 3 charges, that creates a smoke cloud coughing smoke on activation. Both Traitors and Ops can get these."
  - rscadd: "Added smoke kit (5 grenades) with four grenades to uplink for 2 TC"
  - balance: "Makarovs and Toy Pistols come in weapon cases. Complete with spare ammo."
  - balance: "Basic ammo for either weapon comes in weapon cases of three extra magazines at an affordable price."
  - balance: "Donksoft Toy Pistols from the uplink are much stronger than their standard counterparts."
  - balance: "Makarovs and Toy pistols have a magazine capacity of 12 rounds."
  - balance: "Gun/Ammo cases from the traitor uplink can be destroyed by activating the disposal bomb. Press Alt-Right-Click on the case to start the timer."
  - rscadd: "The Mulligan Injector now comes as a kit which can create manifest entries for you under your new identity, as well as an Assistant ID Card with your new name."
  - balance: "Splits surgery dufflebag into two items the dufflebag itself and the medkit"
  - rscadd: "pointless badassery tab is now just Badassery, because there is nothing pointless about being a badass"
  - balance: "powerfist now does 20,30,40 damage and 3,3.5,4 tiles of knockback"